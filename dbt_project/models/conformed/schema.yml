version: 2

models:
  - name: all_suppliers
    description: "Conformed layer combining all 5 supplier sources"

    columns:
      - name: product_name
        description: "Name of the product"
        tests:
          - not_null

      - name: price
        description: "Product price in INR"
        tests:
          - not_null

      - name: quantity
        description: "Number of units ordered"
        tests:
          - not_null

      - name: supplier_id
        description: "Which supplier this row came from"
        tests:
          - not_null
          - accepted_values:
              values:
                - supplier_a
                - supplier_b
                - supplier_c
                - supplier_d
                - supplier_e
